<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f1729">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="Sun, moon, and twilight data for any US ZIP code">
  <title>Sundial – Astronomy</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☀️</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .astro-main {
      max-width: 900px;
    }

    .astro-controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      justify-content: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .astro-controls .input-group { flex: 0 1 auto; }

    #astro-zip {
      width: 8rem;
      padding: 0.6rem 0.85rem;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 0.95rem;
      outline: none;
      transition: border-color var(--transition);
    }
    #astro-zip:focus { border-color: var(--accent); }
    #astro-zip::placeholder { color: var(--text-muted); }

    #astro-go-btn {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: var(--bg-primary);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: opacity var(--transition);
    }
    #astro-go-btn:hover { opacity: 0.85; }

    #astro-location {
      text-align: center;
      margin-bottom: 1rem;
      font-size: 1.15rem;
      font-weight: 600;
    }

    #astro-error {
      text-align: center;
      padding: 1rem;
      color: var(--danger);
      background: rgba(239, 83, 80, 0.08);
      border-radius: var(--radius);
      margin-bottom: 1rem;
    }

    #astro-loading {
      text-align: center;
      padding: 3rem 1rem;
    }

    /* ---- Cards ---- */
    .astro-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    @media (max-width: 500px) {
      .astro-cards { grid-template-columns: 1fr; }
    }

    .astro-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }

    .astro-card h3 {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }

    .astro-row {
      display: flex;
      justify-content: space-between;
      padding: 0.3rem 0;
      font-size: 0.88rem;
    }

    .astro-row .label { color: var(--text-secondary); }
    .astro-row .value { color: var(--text-primary); font-weight: 500; }

    /* ---- Daylight hero ---- */
    .daylight-hero {
      text-align: center;
      margin-bottom: 0.75rem;
    }

    .daylight-hero .big-number {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.1;
    }

    .daylight-hero .sub {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
    }

    .daylight-hero .delta {
      font-size: 0.82rem;
      margin-top: 0.35rem;
    }

    .delta.gaining { color: #f0a848; }
    .delta.losing  { color: #64b5f6; }
    .delta.flat    { color: var(--text-muted); }

    /* ---- Annual chart ---- */
    .annual-chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1rem 0.85rem;
      margin-bottom: 1.25rem;
    }

    .annual-chart-card h3 {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.65rem;
    }

    .annual-chart-wrap {
      position: relative;
      height: 320px;
    }

    .annual-chart-wrap canvas {
      width: 100% !important;
      height: 100% !important;
    }

    .legend-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 0.9rem;
      justify-content: center;
      margin-top: 0.75rem;
      font-size: 0.72rem;
      color: var(--text-secondary);
    }

    .legend-row .swatch {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 3px;
      margin-right: 0.35rem;
      vertical-align: -2px;
    }

    /* ---- Moon display ---- */
    .moon-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .moon-icon {
      font-size: 3rem;
      line-height: 1;
    }

    .moon-phase-name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .moon-illumination {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    /* ---- Moon calendar (inside moon card) ---- */
    .moon-calendar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      justify-content: center;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    .moon-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
      flex: 1 1 2.4rem;
      min-width: 2.4rem;
    }

    .moon-day.md-today {
      background: rgba(240, 168, 72, 0.08);
      border: 1px solid rgba(240, 168, 72, 0.35);
      border-radius: var(--radius-sm);
      padding: 0.2rem 0.1rem;
    }

    .moon-day .md-icon { font-size: 1.25rem; line-height: 1; }
    .moon-day .md-date {
      font-size: 0.68rem;
      color: var(--text-muted);
    }
    .moon-day .md-pct {
      font-size: 0.63rem;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>

  <header>
    <h1>☀️ Sundial</h1>
    <nav class="page-nav">
      <a href="index.html">Weather</a>
      <a href="radar.html">Radar</a>
      <a href="tides.html">Tides</a>
      <a href="astronomy.html" class="active">Astronomy</a>
    </nav>
  </header>

  <main class="astro-main">
    <section class="astro-controls">
      <form id="astro-form" class="input-group">
        <input
          type="text"
          id="astro-zip"
          placeholder="ZIP code"
          pattern="[0-9]{5}"
          maxlength="5"
          inputmode="numeric"
        >
        <button type="submit" id="astro-go-btn">Go</button>
      </form>
    </section>

    <div id="astro-location" class="hidden"></div>

    <section id="astro-error" class="hidden">
      <p id="astro-error-text"></p>
    </section>

    <section id="astro-loading" class="hidden">
      <div class="loading-indicator">Loading astronomy data...</div>
    </section>

    <section id="astro-content" class="hidden">
      <div class="astro-cards">
        <div class="astro-card" id="sun-card">
          <h3>Daylight — Today</h3>
          <div id="sun-details"></div>
        </div>
        <div class="astro-card" id="moon-card">
          <h3>Moon</h3>
          <div id="moon-details"></div>
        </div>
      </div>

      <div class="annual-chart-card">
        <h3>Daylight Through the Year</h3>
        <div class="annual-chart-wrap">
          <canvas id="chart-annual"></canvas>
        </div>
        <div class="legend-row">
          <span><span class="swatch" style="background:#f0a848"></span>Daylight</span>
          <span><span class="swatch" style="background:rgba(240,168,72,0.35)"></span>Civil twilight</span>
          <span><span class="swatch" style="background:rgba(100,130,200,0.35)"></span>Nautical twilight</span>
          <span><span class="swatch" style="background:rgba(50,70,120,0.45)"></span>Astronomical twilight</span>
          <span><span class="swatch" style="background:#0f1729;border:1px solid var(--border)"></span>Night</span>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>
      Powered by
      <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a> &
      <a href="https://nominatim.openstreetmap.org/" target="_blank" rel="noopener">Nominatim</a>
    </p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="js/astronomy.js"></script>
</body>
</html>

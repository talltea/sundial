<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f1729">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="Live weather radar">
  <title>Sundial – Radar</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☀️</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9/dist/leaflet.css">
  <style>
    #radar-map {
      width: 100%;
      height: calc(100vh - 160px);
      height: calc(100dvh - 160px);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      min-height: 300px;
    }

    .radar-controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      justify-content: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .radar-controls .input-group {
      flex: 0 1 auto;
    }

    #radar-zip {
      width: 8rem;
      padding: 0.6rem 0.85rem;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 0.95rem;
      outline: none;
      transition: border-color var(--transition);
    }

    #radar-zip:focus {
      border-color: var(--accent);
    }

    #radar-zip::placeholder {
      color: var(--text-muted);
    }

    #radar-go-btn {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: var(--bg-primary);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: opacity var(--transition);
    }

    #radar-go-btn:hover {
      opacity: 0.85;
    }

    .playback-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .playback-controls button {
      padding: 0.4rem 0.75rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all var(--transition);
    }

    .playback-controls button:hover,
    .playback-controls button.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    #radar-timestamp {
      color: var(--text-muted);
      font-size: 0.82rem;
      min-width: 10rem;
      text-align: center;
    }

    .radar-main {
      max-width: 900px;
    }

    /* Leaflet dark overrides */
    .leaflet-control-zoom a {
      background: var(--bg-card) !important;
      color: var(--text-primary) !important;
      border-color: var(--border) !important;
    }

    .leaflet-control-attribution {
      background: rgba(15, 23, 41, 0.8) !important;
      color: var(--text-muted) !important;
      font-size: 0.7rem !important;
    }

    .leaflet-control-attribution a {
      color: var(--accent) !important;
    }
  </style>
</head>
<body>

  <header>
    <h1>☀️ Sundial</h1>
    <nav class="page-nav">
      <a href="index.html">History</a>
      <a href="radar.html" class="active">Radar</a>
    </nav>
  </header>

  <main class="radar-main">
    <section class="radar-controls">
      <div class="input-group">
        <input
          type="text"
          id="radar-zip"
          placeholder="ZIP code"
          pattern="[0-9]{5}"
          maxlength="5"
          inputmode="numeric"
        >
        <button type="button" id="radar-go-btn">Go</button>
      </div>
      <div class="playback-controls">
        <button type="button" id="radar-prev" title="Previous frame">◀</button>
        <button type="button" id="radar-play" title="Play/Pause">▶</button>
        <button type="button" id="radar-next" title="Next frame">▶▶</button>
        <span id="radar-timestamp"></span>
      </div>
    </section>

    <section id="radar-error" class="hidden">
      <p id="radar-error-text"></p>
    </section>

    <div id="radar-map"></div>
  </main>

  <footer>
    <p>
      Powered by
      <a href="https://www.rainviewer.com/" target="_blank" rel="noopener">RainViewer</a>,
      <a href="https://www.openstreetmap.org/" target="_blank" rel="noopener">OpenStreetMap</a> &
      <a href="https://nominatim.openstreetmap.org/" target="_blank" rel="noopener">Nominatim</a>
    </p>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9/dist/leaflet.js"></script>
  <script src="js/radar.js"></script>
</body>
</html>

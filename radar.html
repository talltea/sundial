<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f1729">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="Live weather radar">
  <title>Sundial – Radar</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☀️</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9/dist/leaflet.css">
  <style>
    #radar-map {
      width: 100%;
      height: calc(100vh - 160px);
      height: calc(100dvh - 160px);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      min-height: 300px;
    }

    .radar-controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      justify-content: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .radar-controls .input-group {
      flex: 0 1 auto;
    }

    #radar-zip {
      width: 8rem;
      padding: 0.6rem 0.85rem;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 0.95rem;
      outline: none;
      transition: border-color var(--transition);
    }

    #radar-zip:focus {
      border-color: var(--accent);
    }

    #radar-zip::placeholder {
      color: var(--text-muted);
    }

    #radar-go-btn {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: var(--bg-primary);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: opacity var(--transition);
    }

    #radar-go-btn:hover {
      opacity: 0.85;
    }

    /* Timeline bar */
    .timeline {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
      padding: 0 0.25rem;
    }

    #radar-play-btn {
      flex-shrink: 0;
      width: 2.2rem;
      height: 2.2rem;
      border: 1.5px solid var(--border);
      border-radius: 50%;
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }

    #radar-play-btn:hover,
    #radar-play-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .timeline-track {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      min-width: 0;
    }

    .timeline-slider-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    #radar-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 3px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }

    #radar-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid var(--bg-primary);
      box-shadow: 0 0 0 2px var(--accent);
      transition: transform 0.15s ease;
    }

    #radar-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid var(--bg-primary);
      box-shadow: 0 0 0 2px var(--accent);
    }

    #radar-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .timeline-labels {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #radar-timestamp {
      color: var(--text-primary);
      font-size: 0.82rem;
      font-weight: 500;
    }

    .timeline-range {
      color: var(--text-muted);
      font-size: 0.72rem;
    }

    .radar-main {
      max-width: 900px;
    }

    /* Leaflet dark overrides */
    .leaflet-control-zoom a {
      background: var(--bg-card) !important;
      color: var(--text-primary) !important;
      border-color: var(--border) !important;
    }

    .leaflet-control-attribution {
      background: rgba(15, 23, 41, 0.8) !important;
      color: var(--text-muted) !important;
      font-size: 0.7rem !important;
    }

    .leaflet-control-attribution a {
      color: var(--accent) !important;
    }
  </style>
</head>
<body>

  <header>
    <h1>☀️ Sundial</h1>
    <nav class="page-nav">
      <a href="index.html">Weather</a>
      <a href="radar.html" class="active">Radar</a>
      <a href="tides.html">Tides</a>
      <a href="astronomy.html">Astronomy</a>
    </nav>
  </header>

  <main class="radar-main">
    <section class="radar-controls">
      <div class="input-group">
        <input
          type="text"
          id="radar-zip"
          placeholder="ZIP code"
          pattern="[0-9]{5}"
          maxlength="5"
          inputmode="numeric"
        >
        <button type="button" id="radar-go-btn">Go</button>
      </div>
    </section>

    <div class="timeline">
      <button type="button" id="radar-play-btn" title="Play/Pause">&#9654;</button>
      <div class="timeline-track">
        <div class="timeline-slider-row">
          <input type="range" id="radar-slider" min="0" max="0" value="0" step="1">
        </div>
        <div class="timeline-labels">
          <span class="timeline-range" id="radar-time-start"></span>
          <span id="radar-timestamp"></span>
          <span class="timeline-range" id="radar-time-end"></span>
        </div>
      </div>
    </div>

    <section id="radar-error" class="hidden">
      <p id="radar-error-text"></p>
    </section>

    <div id="radar-map"></div>
  </main>

  <footer>
    <p>
      Powered by
      <a href="https://www.rainviewer.com/" target="_blank" rel="noopener">RainViewer</a>,
      <a href="https://www.openstreetmap.org/" target="_blank" rel="noopener">OpenStreetMap</a> &
      <a href="https://nominatim.openstreetmap.org/" target="_blank" rel="noopener">Nominatim</a>
    </p>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9/dist/leaflet.js"></script>
  <script src="js/radar.js"></script>
</body>
</html>

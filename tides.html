<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f1729">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="Tide predictions for US coastal stations">
  <title>Sundial – Tides</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☀️</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .tides-main {
      max-width: 700px;
    }

    .tides-controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      justify-content: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .tides-controls .input-group {
      flex: 0 1 auto;
    }

    #tides-zip {
      width: 8rem;
      padding: 0.6rem 0.85rem;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 0.95rem;
      outline: none;
      transition: border-color var(--transition);
    }

    #tides-zip:focus {
      border-color: var(--accent);
    }

    #tides-zip::placeholder {
      color: var(--text-muted);
    }

    #tides-go-btn {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: var(--bg-primary);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: opacity var(--transition);
    }

    #tides-go-btn:hover {
      opacity: 0.85;
    }

    #tides-station-info {
      text-align: center;
      margin-bottom: 1rem;
    }

    #tides-station-name {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    #tides-station-distance {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .tides-range-pills {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    #tides-error {
      text-align: center;
      padding: 1rem;
      color: var(--danger);
      background: rgba(239, 83, 80, 0.08);
      border-radius: var(--radius);
      margin-bottom: 1rem;
    }

    #tides-loading {
      text-align: center;
      padding: 3rem 1rem;
    }

    .tides-chart-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1rem 0.75rem;
      height: 300px;
      margin-bottom: 1rem;
    }

    .tides-chart-container h3 {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .tides-chart-container canvas {
      width: 100% !important;
      height: calc(100% - 1.8rem) !important;
    }

    .hilo-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .hilo-table th,
    .hilo-table td {
      padding: 0.6rem 0.85rem;
      text-align: left;
      font-size: 0.88rem;
      border-bottom: 1px solid var(--border);
    }

    .hilo-table th {
      color: var(--text-muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    .hilo-table tr:last-child td {
      border-bottom: none;
    }

    .hilo-table .type-high {
      color: var(--accent);
      font-weight: 600;
    }

    .hilo-table .type-low {
      color: #64b5f6;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <header>
    <h1>☀️ Sundial</h1>
    <nav class="page-nav">
      <a href="index.html">Weather</a>
      <a href="radar.html">Radar</a>
      <a href="tides.html" class="active">Tides</a>
      <a href="astronomy.html">Astronomy</a>
    </nav>
  </header>

  <main class="tides-main">
    <section class="tides-controls">
      <form id="tides-form" class="input-group">
        <input
          type="text"
          id="tides-zip"
          placeholder="ZIP code"
          pattern="[0-9]{5}"
          maxlength="5"
          inputmode="numeric"
        >
        <button type="submit" id="tides-go-btn">Go</button>
      </form>
    </section>

    <section id="tides-station-info" class="hidden">
      <div id="tides-station-name"></div>
      <div id="tides-station-distance"></div>
    </section>

    <div class="tides-range-pills hidden" id="tides-pills">
      <button class="pill active" data-days="2">2 Days</button>
      <button class="pill" data-days="7">Week</button>
    </div>

    <section id="tides-error" class="hidden">
      <p id="tides-error-text"></p>
    </section>

    <section id="tides-loading" class="hidden">
      <div class="loading-indicator">Loading tide data...</div>
    </section>

    <section id="tides-charts" class="hidden">
      <div class="tides-chart-container">
        <h3>Water Level (ft above MLLW)</h3>
        <canvas id="chart-tides"></canvas>
      </div>
      <table class="hilo-table" id="hilo-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Time</th>
            <th>Type</th>
            <th>Height (ft)</th>
          </tr>
        </thead>
        <tbody id="hilo-body"></tbody>
      </table>
    </section>
  </main>

  <footer>
    <p>
      Powered by
      <a href="https://tidesandcurrents.noaa.gov/" target="_blank" rel="noopener">NOAA CO-OPS</a> &
      <a href="https://nominatim.openstreetmap.org/" target="_blank" rel="noopener">Nominatim</a>
    </p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="js/tides.js"></script>
</body>
</html>
